name: Build and Push Custom n8n Runner

# 触发条件：当 main 分支有代码 push 时，启动自动化流水线
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    # 1. 拉取你 GitHub 仓库里的代码（Dockerfile、json白名单等）
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. 登录到 Docker Hub
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 3. 设置 Docker Buildx（以便支持更高级的编译缓存，加速构建）
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 4. 开始编译并推送镜像
    - name: Build and Push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile
        push: true
        # 记得把 myusername/n8n-custom-runner 改成你自己的 Docker Hub 仓库名
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/n8n-custom-runner:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/n8n-custom-runner:${{ github.sha }}
